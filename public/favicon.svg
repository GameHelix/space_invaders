  <!-- Alien head -->
  <rect x="12" y="6" width="8" height="4" fill="#00ffff"/>
  <!-- Alien legs -->
  <rect x="6" y="20" width="6" height="6" fill="#00ffff"/>
  <rect x="20" y="20" width="6" height="6" fill="#00ffff"/>
  <!-- Alien eyes -->
  <rect x="10" y="13" width="4" height="4" fill="#050510"/>
  <rect x="18" y="13" width="4" height="4" fill="#050510"/>
  <!-- Neon glow effect simulated -->
  <rect x="12" y="4" width="4" height="2" fill="#00ffff" opacity="0.6"/>
  <rect x="16" y="4" width="4" height="2" fill="#00ffff" opacity="0.6"/>
